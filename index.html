<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Waiting Game</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:700,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-dark: #081a39;
      --primary-blue: #235dff;
      --gold: #ffd700;
      --pill-gradient: linear-gradient(90deg, #235dff 0%, #4286f4 60%, #ffd700 100%);
      --card-bg: #111827;
      --accent-bg: #212d45;
      --border-radius: 22px;
      --shadow: 0 8px 32px rgba(23,40,70,0.15);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--primary-dark);
      font-family: 'Montserrat', Arial, sans-serif;
      color: #fff;
      min-height: 100vh;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    .wrapper {
      max-width: 450px;
      margin: 0 auto;
      padding: 28px 14px 20px 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .counter-card {
      background: var(--accent-bg);
      box-shadow: var(--shadow);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 22px 26px;
      margin-bottom: 0.5rem;
    }
    .counter-icon {
      font-size: 2.2rem;
      margin-right: 20px;
      opacity: 0.94;
    }
    .counter-label {
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: #b3c2da;
      margin-bottom: 2px;
    }
    .counter-time {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 2px 10px rgba(255,215,0,0.13);
      letter-spacing: 0.04em;
    }
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      padding: 28px 24px 24px 24px;
      position: relative;
      overflow: hidden;
    }
    .millionaire-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(165deg, rgba(35,93,255,0.12), rgba(255,215,0,0.08) 85%);
      pointer-events: none;
      z-index: 1;
      border-radius: var(--border-radius);
    }
    .card-title {
      display: flex;
      align-items: center;
      font-size: 1.32rem;
      font-weight: 700;
      gap: 0.52em;
      margin-bottom: 20px;
      z-index: 2;
      position: relative;
      letter-spacing: 0.04em;
    }

    /* Pill button styling */
    .pill-buttons {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      margin-bottom: 16px;
    }
    .pill-btn {
      background: var(--pill-gradient);
      color: var(--primary-dark);
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      padding: 10px 28px;
      box-shadow: 0 3px 16px rgba(50,60,150,0.10);
      cursor: pointer;
      outline: none;
      transition: filter 0.14s, box-shadow 0.18s;
      position: relative;
    }
    .pill-btn.selected, .pill-btn:active {
      filter: brightness(1.03) contrast(1.2);
      box-shadow: 0 4px 20px #ffd70060;
    }

    /* Trivia styles */
    .trivia-q {
      margin: 16px 0 22px 0;
      font-size: 1.13rem;
      font-weight: 500;
      line-height: 1.41;
    }
    .trivia-choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .trivia-choice-btn {
      background: linear-gradient(90deg, #f6f6f8 0%, #ebeff8 100%);
      color: #0C1742;
      font-weight: 700;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1.05rem;
      letter-spacing: 0.03em;
      margin-bottom: 0;
      box-shadow: 0 1px 10px rgba(32,58,99,0.10);
      transition: background 0.12s, color 0.14s;
      cursor: pointer;
      outline: none;
      position: relative;
      z-index: 2;
      text-align: left;
    }
    .trivia-choice-btn.correct {
      background: linear-gradient(90deg, #ffd700 40%, #fff3c4 100%);
      color: #111;
      box-shadow: 0 2px 18px #ffd70022;
    }
    .trivia-choice-btn.wrong {
      background: #19405a65;
      color: #7e889c;
      filter: grayscale(0.35);
    }
    .trivia-feedback {
      margin: 10px 2px 0 2px;
      min-height: 22px;
      font-weight: 700;
      color: #ffd700;
      letter-spacing: 0.03em;
      font-size: 1.07em;
      z-index: 2;
      position: relative;
      height: 1.2em;
      transition: color 0.11s;
    }

    /* RPS styles */
    .rps-btns {
      display: flex;
      gap: 1.12rem;
      justify-content: center;
      margin: 22px 0;
    }
    .rps-btn {
      background: #212d45;
      color: #fff;
      font-size: 2rem;
      border: none;
      border-radius: 50%;
      width: 54px;
      height: 54px;
      box-shadow: 0 2px 8px #235dff15;
      cursor: pointer;
      transition: background 0.17s, box-shadow 0.14s;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
      user-select: none;
      position: relative;
    }
    .rps-btn.selected, .rps-btn:active {
      background: #235dffdd;
      box-shadow: 0 4px 16px #235dff44;
    }
    .rps-result {
      text-align: center;
      margin: 14px 0 6px 0;
      min-height: 22px;
      font-weight: 600;
      font-size: 1.06rem;
      letter-spacing: 0.03em;
      color: #ffd700;
      height: 1.2em;
      transition: color 0.13s;
    }

    /* VS mobile sizing */
    @media (max-width: 600px) {
      .wrapper { max-width: 100vw; padding: 14vw 2vw 5vw 2vw; }
      .card { padding: 6vw 3vw 7vw 3vw; }
      .counter-card { padding: 4.5vw 4vw; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- Total Wait Time Counter -->
    <div class="counter-card" style="margin-bottom: 2.4rem;">
      <div class="counter-icon" aria-hidden="true">⏳</div>
      <div>
        <div class="counter-label">Total Wait Time</div>
        <div id="wait-time" class="counter-time">00:00:00</div>
      </div>
    </div>

    <div class="cards-grid">

      <!-- Know-It-All Trivia Card -->
      <div class="card" id="trivia-card">
        <div class="millionaire-overlay"></div>
        <div class="card-title"><span role="img" aria-label="">🧐</span>Know-It-All</div>
        <div class="pill-buttons" id="trivia-category-btns">
          <button class="pill-btn selected" data-cat="geography">Geography</button>
          <button class="pill-btn" data-cat="life">Life</button>
        </div>
        <div class="trivia-q" id="trivia-question">Loading...</div>
        <div class="trivia-choices" id="trivia-choices"></div>
        <div class="trivia-feedback" id="trivia-feedback"></div>
      </div>

      <!-- RPS Duel Card -->
      <div class="card" id="rps-card">
        <div class="card-title"><span role="img" aria-label="">✊</span>RPS Duel</div>
        <div class="rps-btns">
          <button class="rps-btn" data-move="rock" aria-label="Rock">✊</button>
          <button class="rps-btn" data-move="paper" aria-label="Paper">✋</button>
          <button class="rps-btn" data-move="scissors" aria-label="Scissors">✌️</button>
        </div>
        <div class="rps-result" id="rps-result"></div>
        <div style="text-align:center; color:#b5cff0; font-size:0.97em; font-weight:400;">
          Pick rock, paper, or scissors to duel the phone!
        </div>
      </div>
    </div>
  </div>

  <script>
    // === Total Wait Time Counter ===
    (function waitTimeCounter() {
      const el = document.getElementById('wait-time');
      let start = Date.now();
      function pad(n){return n<10?'0'+n:n;}
      function update(){
        let diff = Math.floor((Date.now()-start)/1000);
        let h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
        el.textContent = pad(h)+':'+pad(m)+':'+pad(s);
        requestAnimationFrame(update);
      }
      update();
    })();

    // === Trivia Game ===
    const TRIVIA_QUESTIONS = {
      geography: [
        {
          q: "Which country has the longest coastline in the world?",
          a: "Canada",
          choices: ["Australia", "Russia", "USA", "Canada"]
        },
        {
          q: "Mount Everest lies on the border of Nepal and which country?",
          a: "China",
          choices: ["India", "China", "Bhutan", "Tibet"]
        },
        {
          q: "The Nile River flows into which sea?",
          a: "Mediterranean Sea",
          choices: ["Red Sea", "Arabian Sea", "Black Sea", "Mediterranean Sea"]
        },
        {
          q: "Which is the world's largest desert?",
          a: "Sahara",
          choices: ["Gobi", "Kalahari", "Arabian", "Sahara"]
        }
      ],
      life: [
        {
          q: "What vitamin do humans get from sunlight?",
          a: "Vitamin D",
          choices: ["Vitamin A", "Vitamin C", "Vitamin D", "Vitamin B12"]
        },
        {
          q: "Humans and chimpanzees share roughly how much DNA?",
          a: "98%",
          choices: ["65%", "98%", "86%", "78%"]
        },
        {
          q: "Which organ is vital for removing toxins from the blood?",
          a: "Liver",
          choices: ["Lung", "Stomach", "Liver", "Pancreas"]
        },
        {
          q: "On average, how long does it take sunlight to reach Earth?",
          a: "8 minutes",
          choices: ["1 minute", "5 minutes", "8 minutes", "16 minutes"]
        }
      ]
    };

    let currentCategory = 'geography';
    let triviaPool = [];
    let triviaCurrent = null;
    let triviaLock = false;

    function shuffle(arr) {
      let a = arr.slice();
      for(let i=a.length-1;i>0;--i){
        let j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }

    function nextTriviaQuestion() {
      if(triviaPool.length < 1) {
        triviaPool = shuffle(TRIVIA_QUESTIONS[currentCategory]);
      }
      triviaCurrent = triviaPool.pop();
      if (!triviaCurrent) return;
      document.getElementById('trivia-question').textContent = triviaCurrent.q;
      const choicesCont = document.getElementById('trivia-choices');
      const feedback = document.getElementById('trivia-feedback');
      feedback.textContent = '';
      triviaLock = false;

      // Shuffle answers
      let allChoices = shuffle(triviaCurrent.choices);
      choicesCont.innerHTML = '';
      allChoices.forEach(choice => {
        const btn = document.createElement('button');
        btn.type = "button";
        btn.className = "trivia-choice-btn";
        btn.textContent = choice;
        btn.onclick = () => {
          if(triviaLock) return;
          triviaLock = true;
          if(choice === triviaCurrent.a){
            btn.classList.add('correct');
            feedback.textContent = 'Correct! 🎉';
            setTimeout(nextTriviaQuestion, 1450);
          } else {
            btn.classList.add('wrong');
            feedback.textContent = 'Oops! ' + triviaCurrent.a + ' is correct.';
            Array.from(choicesCont.children).forEach(b=> {
              if(b.textContent===triviaCurrent.a) b.classList.add('correct');
            });
            setTimeout(nextTriviaQuestion, 1850);
          }
          // Dim the rest
          Array.from(choicesCont.children).forEach(b=>{
            if(b!==btn && b.textContent!==triviaCurrent.a) b.classList.add('wrong');
          });
        };
        choicesCont.appendChild(btn);
      });
    }

    // Handle switching category
    document.getElementById('trivia-category-btns').addEventListener('click', function(e){
      if(e.target.classList.contains('pill-btn')) {
        if(e.target.classList.contains('selected')) return;
        Array.from(this.children).forEach(b=>b.classList.remove('selected'));
        e.target.classList.add('selected');
        currentCategory = e.target.getAttribute('data-cat');
        triviaPool = [];
        nextTriviaQuestion();
      }
    });

    // Init first question
    nextTriviaQuestion();

    // === RPS Duel Game ===
    const moves = ['rock','paper','scissors'];
    const emoji = {rock:"✊",paper:"✋",scissors:"✌️"};
    function getRandomMove() {
      return moves[Math.floor(Math.random()*3)];
    }
    function getRpsResult(player, ai) {
      if(player === ai) return "Draw! 🤝";
      if(
        (player==='rock'&&ai==='scissors')||
        (player==='scissors'&&ai==='paper')||
        (player==='paper'&&ai==='rock')
      ) return "You Win! 🎉";
      return "You Lose! 😅";
    }

    var selectedBtn = null;
    document.querySelectorAll('.rps-btn').forEach(btn=>{
      btn.addEventListener('click', function(){
        if(selectedBtn) selectedBtn.classList.remove('selected');
        btn.classList.add('selected');
        selectedBtn = btn;
        let playerMove = btn.getAttribute('data-move');
        let aiMove = getRandomMove();
        document.getElementById('rps-result').innerHTML =
          `<span style="color:#00c0ff">${emoji[playerMove]}</span> vs <span style="color:${aiMove===playerMove?'#ffd700':'#235dff'}">${emoji[aiMove]}</span><br><strong>${getRpsResult(playerMove, aiMove)}</strong>`;
        setTimeout(()=>{
          btn.classList.remove('selected');
          selectedBtn = null;
        }, 960);
      });
    });

    // Prevent drag highlight on iPhone
    document.body.addEventListener('touchmove', function(e){
      if(e.scale !== 1){e.preventDefault();}
    }, { passive: false });
  </script>
</body>
</html>
